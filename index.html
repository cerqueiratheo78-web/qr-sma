<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SMA — Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Inconsolata:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c8a96e;
      --bg: #0c0c0c;
      --border: #1e1e1e;
      --cream: #f5f0e8;
      --text: #666;
      --blue: #60a5fa;
    }
    body {
      background: var(--bg);
      font-family: 'Inconsolata', monospace;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }
    .page { width: 100%; max-width: 340px; animation: fadeUp 0.4s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    /* HEADER */
    .header { display:flex; align-items:center; gap:12px; margin-bottom:36px; }
    .logo-img { width:34px; height:34px; border-radius:50%; object-fit:cover; }
    .brand { font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:600; color:#fff; flex:1; }
    .dot { width:6px; height:6px; border-radius:50%; background:#222; transition:all 0.4s; flex-shrink:0; }
    .dot.live { background:#4ade80; box-shadow:0 0 8px #4ade80; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

    /* COMPTEUR */
    .counter-block { margin-bottom:32px; }
    .lbl { font-size:9px; letter-spacing:0.4em; text-transform:uppercase; color:#333; margin-bottom:6px; }
    .counter-value {
      font-family:'Cormorant Garamond',serif;
      font-size:96px; font-weight:300; color:var(--gold);
      line-height:1; letter-spacing:-3px;
      font-variant-numeric:tabular-nums;
    }
    .counter-sub { font-size:10px; color:#333; margin-top:4px; }

    /* DERNIER SCAN */
    .last-block {
      display:flex; align-items:center; gap:10px;
      padding:12px 0;
      border-top:1px solid var(--border);
      border-bottom:1px solid var(--border);
      margin-bottom:32px;
    }
    .last-icon { font-size:16px; }
    .last-label { font-size:9px; letter-spacing:0.3em; text-transform:uppercase; color:#2d2d2d; margin-bottom:3px; }
    .last-date { font-size:12px; color:var(--blue); }

    /* QR */
    .qr-block { display:flex; flex-direction:column; align-items:center; gap:12px; margin-bottom:32px; }
    .qr-frame { background:var(--cream); border-radius:12px; padding:14px; position:relative; }
    .qr-wrapper { position:relative; width:180px; height:180px; }
    #qr-container { width:180px; height:180px; }
    #qr-container canvas, #qr-container img { width:180px!important; height:180px!important; display:block; }
    .qr-logo {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:44px; height:44px;
      border-radius:50%; background:var(--cream);
      padding:3px; box-shadow:0 0 0 3px var(--cream);
      overflow:hidden;
    }
    .qr-logo img { width:100%; height:100%; border-radius:50%; display:block; object-fit:cover; }
    .btn-open {
      background:none; border:1px solid var(--border); color:var(--text);
      border-radius:6px; padding:9px 22px; font-size:10px;
      font-family:'Inconsolata',monospace; letter-spacing:0.2em;
      text-transform:uppercase; cursor:pointer; transition:all 0.2s;
    }
    .btn-open:hover { border-color:var(--gold); color:var(--gold); }

    /* HISTORIQUE */
    .history-block { }
    .history-item {
      display:flex; align-items:center; gap:10px;
      padding:9px 0; border-bottom:1px solid var(--border);
    }
    .h-num { font-size:9px; color:#2a2a2a; width:20px; flex-shrink:0; }
    .h-date { font-size:11px; color:#555; flex:1; }
    .h-new { font-size:8px; letter-spacing:0.1em; color:#4ade80; }

    /* FOOTER */
    .footer-row {
      display:flex; align-items:center; justify-content:space-between;
      margin-top:24px; padding-top:16px; border-top:1px solid var(--border);
    }
    .sync-txt { font-size:9px; color:#252525; }
    .btn-reset {
      background:none; border:none; color:#252525;
      font-size:9px; cursor:pointer; font-family:monospace;
      letter-spacing:0.1em; transition:color 0.2s;
    }
    .btn-reset:hover { color:#f87171; }
  </style>
</head>
<body>
<div class="page">

  <div class="header">
    <img class="logo-img" id="header-logo" alt="SMA"/>
    <div class="brand">Serrure Metal Art</div>
    <div class="dot" id="live-dot"></div>
  </div>

  <div class="counter-block">
    <div class="lbl">Scans QR</div>
    <div class="counter-value" id="counter">—</div>
    <div class="counter-sub" id="counter-sub"></div>
  </div>

  <div class="last-block">
    <div class="last-icon">📱</div>
    <div>
      <div class="last-label">Dernier scan</div>
      <div class="last-date" id="last-date">—</div>
    </div>
  </div>

  <div class="qr-block">
    <div class="qr-frame">
      <div class="qr-wrapper">
        <div id="qr-container"></div>
        <div class="qr-logo"><img id="logo-img" alt="SMA"/></div>
      </div>
    </div>
    <button class="btn-open" onclick="handleOpen()">↗ Ouvrir le site</button>
  </div>

  <div class="lbl" style="margin-bottom:12px">Historique</div>
  <div id="history-list"></div>

  <div class="footer-row">
    <div class="sync-txt" id="sync-txt"></div>
    <button class="btn-reset" onclick="handleReset()">reset</button>
  </div>

</div>

const isScan = new URLSearchParams(window.location.search).get("scan") === "1";

if (isScan) {
  window.location.replace(TARGET_URL);
  fetch("https://api.jsonbin.io/v3/b/" + BIN_ID + "/latest", {
    headers: {"X-Master-Key": API_KEY}
  }).then(r => r.json()).then(j => {
    const d = j.record;
    const count = (d.count||0) + 1;
    const date = new Date().toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
    const history = [{date,source:"qr",id:Date.now()},...(d.history||[])].slice(0,50);
    return fetch("https://api.jsonbin.io/v3/b/" + BIN_ID, {
      method:"PUT", headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},
      body:JSON.stringify({count,history})
    });
  }).catch(()=>{});
} else {
  document.getElementById("logo-img").src    = LOGO_SRC;
  document.getElementById("header-logo").src = LOGO_SRC;
  buildQR();
  loadRemote();
  setInterval(loadRemote, 30000);
}

async function fetchData() {
  const r = await fetch("https://api.jsonbin.io/v3/b/" + BIN_ID + "/latest", {headers:{"X-Master-Key":API_KEY}});
  if (!r.ok) throw new Error(r.status);
  return (await r.json()).record;
}
async function saveData(d) {
  await fetch("https://api.jsonbin.io/v3/b/" + BIN_ID, {
    method:"PUT", headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},
    body:JSON.stringify(d)
  });
}

function renderAll(data) {
  const hist  = (data.history||[]).filter(e => e.source === "qr");
  const total = hist.length;

  document.getElementById("counter").textContent     = String(total).padStart(3,"0");
  document.getElementById("counter-sub").textContent = total === 0 ? "aucun scan" : total === 1 ? "1 personne a scanne" : total + " personnes ont scanne";
  document.getElementById("last-date").textContent   = hist[0] ? hist[0].date : "—";

  const list = document.getElementById("history-list");
  if (!hist.length) { list.innerHTML = '<div style="font-size:11px;color:#2a2a2a;padding:8px 0">Aucun scan pour le moment.</div>'; return; }
  list.innerHTML = hist.map((e,i) =>
    '<div class="history-item">'
    + '<span class="h-num">#' + String(hist.length-i).padStart(2,"0") + '</span>'
    + '<span class="h-date">' + e.date + '</span>'
    + (i===0 ? '<span class="h-new">nouveau</span>' : '')
    + '</div>'
  ).join("");
}

async function loadRemote() {
  try {
    const d = await fetchData();
    renderAll(d);
    document.getElementById("live-dot").className = "dot live";
    document.getElementById("sync-txt").textContent = "sync " + new Date().toLocaleTimeString("fr-FR");
  } catch(e) {
    document.getElementById("live-dot").className = "dot";
    document.getElementById("sync-txt").textContent = "erreur connexion";
  }
}

async function handleOpen() {
  try {
    const d = await fetchData();
    const count = (d.count||0)+1;
    const date = new Date().toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
    const history = [{date,source:"pc",id:Date.now()},...(d.history||[])].slice(0,50);
    await saveData({count,history});
    renderAll({count,history});
    document.getElementById("live-dot").className = "dot live";
  } catch(e) {}
  window.open(TARGET_URL,"_blank");
}

async function handleReset() {
  if (!confirm("Remettre a zero ?")) return;
  await saveData({count:0,history:[]});
  renderAll({count:0,history:[]});
}

function buildQR() {
  const c = document.getElementById("qr-container");
  if (!c) return;
  c.innerHTML = "";
  new QRCode(c, {text:QR_URL, width:180, height:180, colorDark:"#1a1a1a", colorLight:"#f5f0e8", correctLevel:QRCode.CorrectLevel.H});
}
</script>
